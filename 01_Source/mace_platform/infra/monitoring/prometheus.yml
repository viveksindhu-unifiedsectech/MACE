# MACE Platform - Prometheus local scrape config
# For docker-compose.local.yml development stack.
# For Kubernetes: use kube-prometheus-stack + ServiceMonitor CRD.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    environment: local
    product: mace-v2

rule_files: []

scrape_configs:
  - job_name: mace-api
    static_configs:
      - targets: ['mace-api:8080']
        labels: { service: mace-api, environment: local }
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: celery-flower
    static_configs:
      - targets: ['flower:5555']
        labels: { service: celery }
    metrics_path: /metrics
    scrape_interval: 60s

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
