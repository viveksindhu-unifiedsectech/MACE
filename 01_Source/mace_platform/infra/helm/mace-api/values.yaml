## UnifiedSec MACE API — Helm Values
## Override per environment with: helm upgrade -f values-prod.yaml

replicaCount: 3

image:
  repository: ""  # Set to ECR URL: 123456789.dkr.ecr.us-east-1.amazonaws.com/mace-api
  tag: "latest"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: "mace-api"

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ""  # Set to IRSA role ARN

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: ""  # Set to ACM cert ARN
    alb.ingress.kubernetes.io/wafv2-acl-arn: ""    # Set to WAF ACL ARN
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
  hosts:
    - host: api.unifiedsec.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

env:
  DEBUG: "false"
  ENVIRONMENT: "production"
  APP_VERSION: "2.0.0"
  DEPLOYMENT_REGION: "us-east-1"
  DATA_RESIDENCY_JURISDICTION: "US"
  MACE_CDCS_ALERT_THRESHOLD: "7.0"
  MACE_REA_CDCS_THRESHOLD: "6.5"
  MACE_MATCH_THRESHOLD: "0.38"

# Secrets loaded from AWS Secrets Manager via External Secrets Operator
externalSecrets:
  enabled: true
  secretStore: aws-secretsmanager
  refreshInterval: 1h
  secretKeys:
    - name: SECRET_KEY
      key: mace/production/secret-key
    - name: DATABASE_URL
      key: mace/production/database-url
    - name: REDIS_URL
      key: mace/production/redis-url
    - name: STRIPE_SECRET_KEY
      key: mace/production/stripe-secret-key

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app: mace-api

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
