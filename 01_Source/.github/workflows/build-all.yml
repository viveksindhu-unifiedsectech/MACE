name: Build MACE Agent — all platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install pyinstaller==6.20.0
      - run: python -m PyInstaller mace_platform/agent/build/mace-agent.spec --noconfirm
      - uses: actions/upload-artifact@v4
        with:
          name: mace-agent-windows
          path: dist/mace-agent.exe

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install pyinstaller==6.20.0
      - run: python -m PyInstaller mace_platform/agent/build/mace-agent.spec --noconfirm
      - run: ditto -c -k --sequesterRsrc --keepParent dist/MACEAgent.app dist/MACEAgent.app.zip
      - uses: actions/upload-artifact@v4
        with:
          name: mace-agent-macos
          path: |
            dist/mace-agent
            dist/MACEAgent.app.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install pyinstaller==6.20.0
      - run: python -m PyInstaller mace_platform/agent/build/mace-agent.spec --noconfirm
      - uses: actions/upload-artifact@v4
        with:
          name: mace-agent-linux
          path: dist/mace-agent

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Assemble debug APK
        working-directory: mace_platform/agent/mobile/android_app
        run: |
          chmod +x ./gradlew || true
          ./gradlew assembleRelease --no-daemon || \
            ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: mace-agent-android
          path: mace_platform/agent/mobile/android_app/app/build/outputs/apk/**/*.apk

  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build iOS app (unsigned IPA — for archive only; production signing needs your Apple ID)
        working-directory: mace_platform/agent/mobile/ios_app
        run: |
          xcodebuild -project MACEAgent.xcodeproj -scheme MACEAgent \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/MACEAgent.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO || true
      - uses: actions/upload-artifact@v4
        with:
          name: mace-agent-ios
          path: |
            mace_platform/agent/mobile/ios_app/build/MACEAgent.xcarchive
