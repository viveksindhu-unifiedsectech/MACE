name: MACEAgent
options:
  bundleIdPrefix: io.unifiedsec
  deploymentTarget:
    iOS: "15.0"
targets:
  MACEAgent:
    type: application
    platform: iOS
    sources:
      - path: MACEAgent
    info:
      path: MACEAgent/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.unifiedsec.maceagent
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ENABLE_BITCODE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
