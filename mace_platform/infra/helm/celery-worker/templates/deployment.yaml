apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  labels:
    app: celery-worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      terminationGracePeriodSeconds: 120
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          command:
            - celery
            - -A
            - app.workers.celery_app
            - worker
            - --loglevel=info
            - --concurrency={{ .Values.worker.concurrency }}
            - --queues={{ .Values.worker.queues }}
            - --without-heartbeat
            - --without-gossip
          envFrom:
            - secretRef:
                name: mace-api-secrets
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - app.workers.celery_app
                - inspect
                - ping
                - -t
                - "5"
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
---
{{- if .Values.beat.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  labels:
    app: celery-beat
spec:
  replicas: 1  # Beat must be singleton
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: beat
          image: "{{ .Values.beat.image.repository }}:{{ .Values.beat.image.tag }}"
          command:
            - celery
            - -A
            - app.workers.celery_app
            - beat
            - --loglevel=info
            - --scheduler=celery.beat:PersistentScheduler
            - --schedule=/tmp/celerybeat-schedule
          envFrom:
            - secretRef:
                name: mace-api-secrets
          resources:
            {{- toYaml .Values.beat.resources | nindent 12 }}
          volumeMounts:
            - name: beat-schedule
              mountPath: /tmp
      volumes:
        - name: beat-schedule
          emptyDir: {}
{{- end }}
